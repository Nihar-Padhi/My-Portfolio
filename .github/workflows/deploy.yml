name: Deploy site

on:
  push:
    branches: [main]

# Required for OIDC: lets the job request a short-lived token to assume the AWS role.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::368351960346:role/github-actions-portfolio-deploy
          aws-region: ap-south-1

      - name: Sync site to S3
        run: |
          aws s3 sync . s3://niharpadhi-site \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2O3U6XU96WGKY \
            --paths "/*"
