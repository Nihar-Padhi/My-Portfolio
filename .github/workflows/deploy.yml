name: Deploy site

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Inspect OIDC claims
        run: |
          token_json="$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          token="$(printf '%s' "$token_json" | jq -r '.value')"
          claims="$(python3 -c 'import base64,json,sys; p=sys.argv[1].split(".")[1]; p += "=" * (-len(p) % 4); print(json.dumps(json.loads(base64.urlsafe_b64decode(p)), sort_keys=True))' "$token")"
          sub="$(printf '%s' "$claims" | jq -r '.sub')"
          aud="$(printf '%s' "$claims" | jq -r '.aud')"
          echo "::warning title=OIDC subject::$sub"
          echo "::warning title=OIDC audience::$aud"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::368351960346:role/github-actions-portfolio-deploy
          aws-region: ap-south-1
          role-skip-session-tagging: true
          retry-max-attempts: 3

      - name: Sync site to S3
        run: |
          aws s3 sync . s3://niharpadhi-site \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "deploy.sh"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2O3U6XU96WGKY \
            --paths "/*"
